<div class="container mt-4">
  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h3 class="h5 mb-0">
            <i class="bi bi-bar-chart-fill me-2"></i>
            Países más poblados
          </h3>
        </div>
        
        <div class="card-body">
          <!-- Estado de carga -->
          <div *ngIf="cargando" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 text-muted">Cargando gráfica...</p>
          </div>

          <!-- GRAFICA -->
          <div *ngIf="!cargando && paises.length > 0" class="text-center">
            <canvas id="miGrafica" width="400" class="w-100" style="height: 300px;"></canvas>
          </div>

          <!-- Sin datos -->
          <div *ngIf="!cargando && paises.length === 0" class="alert alert-warning text-center py-5">
            <i class="bi bi-exclamation-triangle display-4 d-block mb-3"></i>
            <p class="mb-0">No se pudieron cargar los datos</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
