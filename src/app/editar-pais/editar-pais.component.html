<!-- editar-pais.component.html -->
<div class="container" *ngIf="paisOriginal">
    <div class="header">
        <h2>✏️ Editando {{ paisOriginal.nombre }}</h2>
        <p class="subtitle">Modifica los datos de tu viaje a {{ paisOriginal.nombre }}</p>
    </div>

    <!-- Tarjeta del país (datos fijos que NO se pueden editar) -->
    <div class="pais-card">
        <div class="pais-imagen">
            <img [src]="paisOriginal.bandera" [alt]="'Bandera de ' + paisOriginal.nombre">
        </div>
        <div class="pais-info">
            <h3>{{ paisOriginal.nombre }}</h3>
            <p><span class="label">ID:</span> {{ paisOriginal.id }}</p>
            <!-- Muestra la bandera actual si quieres -->
        </div>
    </div>

    <!-- Formulario de edición -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">
        <h3>📋 Datos del viaje</h3>

        <!-- Motivo del viaje -->
        <div class="form-group">
            <label for="motivoViaje">🎯 Motivo del viaje *</label>
            <select id="motivoViaje" formControlName="motivoViaje" class="form-control">
                <option value="">-- Selecciona un motivo --</option>
                <option value="Vacaciones">🏖️ Vacaciones</option>
                <option value="Trabajo">💼 Trabajo</option>
                <option value="Estudios">📚 Estudios</option>
                <option value="Familia">👪 Visitar familia/amigos</option>
                <option value="Aventura">⛰️ Aventura</option>
                <option value="Cultura">🎭 Turismo cultural</option>
                <option value="Gastronomía">🍷 Gastronomía</option>
                <option value="Otro">✨ Otro</option>
            </select>
            <div *ngIf="form.get('motivoViaje')?.invalid && form.get('motivoViaje')?.touched" class="error">
                El motivo es obligatorio
            </div>
        </div>

        <!-- Zona/Región -->
        <div class="form-group">
            <label for="zona">📍 Zona/Región de interés *</label>
            <input 
                type="text" 
                id="zona" 
                formControlName="zona" 
                class="form-control"
                placeholder="Ej: Costa, Montaña, Capital, Norte...">
            <div *ngIf="form.get('zona')?.invalid && form.get('zona')?.touched" class="error">
                La zona es obligatoria
            </div>
        </div>

        <!-- Presupuesto -->
        <div class="form-group">
            <label for="presupuesto">💰 Presupuesto estimado (€) *</label>
            <input 
                type="number" 
                id="presupuesto" 
                formControlName="presupuesto" 
                class="form-control"
                min="0"
                step="100"
                placeholder="Ej: 1500">
            <div *ngIf="form.get('presupuesto')?.invalid && form.get('presupuesto')?.touched" class="error">
                El presupuesto es obligatorio y debe ser positivo
            </div>
        </div>

        <!-- Prioridad -->
        <div class="form-group">
            <label for="prioridad">⭐ Prioridad *</label>
            <select id="prioridad" formControlName="prioridad" class="form-control">
                <option value="1">1 ⭐ (Baja - Algún día)</option>
                <option value="2">2 ⭐⭐</option>
                <option value="3">3 ⭐⭐⭐ (Media - Me gustaría ir)</option>
                <option value="4">4 ⭐⭐⭐⭐</option>
                <option value="5">5 ⭐⭐⭐⭐⭐ (Alta - ¡Quiero ir ya!)</option>
            </select>
        </div>

        <!-- Notas personales -->
        <div class="form-group">
            <label for="notasPersonales">📝 Notas personales</label>
            <textarea 
                id="notasPersonales" 
                formControlName="notasPersonales" 
                class="form-control"
                rows="4"
                placeholder="¿Qué te gustaría hacer allí? ¿Alguna experiencia especial?">
            </textarea>
        </div>

        <!-- Botones -->
        <div class="button-group">
            <button type="submit" [disabled]="form.invalid" class="btn btn-primary">
                ✅ Actualizar viaje
            </button>
            <button type="button" (click)="cancelar()" class="btn btn-secondary">
                ❌ Cancelar
            </button>
        </div>
    </form>
</div>

<!-- Mensaje de carga -->
<div *ngIf="!paisOriginal" class="loading-container">
    <div class="spinner"></div>
    <p>Cargando datos del país...</p>
</div>
